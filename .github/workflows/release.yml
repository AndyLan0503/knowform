name: release

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run test suite
        run: PYTHONPATH=src python -m unittest discover -s tests -t . -v

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI trusted publishing (OIDC); no API token stored
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags so hatch-vcs derives the version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # Move the `v1` tag that the README's Action + pre-commit examples pin, so
  # those never need editing per release. Runs AFTER publish, so the build above
  # only ever sees the exact vX.Y.Z tag on HEAD (v1 still points at the prior
  # release), keeping hatch-vcs version derivation unambiguous.
  promote-major:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Point v1 at this release
        run: |
          git tag -f v1
          git push -f origin v1
